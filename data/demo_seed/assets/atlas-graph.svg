<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Confluence Wiki Demo Graph</title>
  <desc id="desc">DEMO와 ARCH 문서가 서로 연결된 샘플 그래프 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f1e3" />
      <stop offset="100%" stop-color="#e6f3ee" />
    </linearGradient>
  </defs>
  <rect width="720" height="420" rx="28" fill="url(#bg)" />
  <g stroke-linecap="round">
    <line x1="210" y1="128" x2="370" y2="104" stroke="#b45309" stroke-width="7" />
    <line x1="210" y1="128" x2="360" y2="246" stroke="#b45309" stroke-width="7" />
    <line x1="210" y1="128" x2="540" y2="156" stroke="#1d4ed8" stroke-width="5" stroke-dasharray="14 12" />
    <line x1="370" y1="104" x2="360" y2="246" stroke="#1d4ed8" stroke-width="5" stroke-dasharray="14 12" />
  </g>
  <g font-family="'Noto Sans KR', sans-serif" text-anchor="middle">
    <g>
      <circle cx="210" cy="128" r="64" fill="#1f6f5f" />
      <text x="210" y="120" fill="#fffaf0" font-size="22" font-weight="700">DEMO</text>
      <text x="210" y="148" fill="#fffaf0" font-size="20">홈</text>
    </g>
    <g>
      <circle cx="370" cy="104" r="54" fill="#b45309" />
      <text x="370" y="110" fill="#fffaf0" font-size="18" font-weight="700">운영</text>
      <text x="370" y="134" fill="#fffaf0" font-size="16">대시보드</text>
    </g>
    <g>
      <circle cx="360" cy="246" r="56" fill="#0f766e" />
      <text x="360" y="252" fill="#fffaf0" font-size="18" font-weight="700">런북</text>
    </g>
    <g>
      <circle cx="540" cy="156" r="58" fill="#1d4ed8" />
      <text x="540" y="148" fill="#fffaf0" font-size="18" font-weight="700">ARCH</text>
      <text x="540" y="174" fill="#fffaf0" font-size="16">메모</text>
    </g>
  </g>
</svg>
