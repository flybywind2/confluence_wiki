<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Confluence Wiki{% endblock %}</title>
    <meta name="description" content="{{ meta_description or 'Confluence mirror에서 동기화한 markdown wiki를 읽기 중심 UI로 제공합니다.' }}" />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body
    data-selected-space="{{ selected_space or 'all' }}"
    data-selected-space-name="{{ selected_space_name or '전체 위키' }}"
  >
    <div class="page-shell">
      <aside class="sidebar">
        <a class="brand" href="/">Confluence Wiki</a>
        <p class="brand-subtitle">Mirror Sync Knowledge Atlas</p>
        <nav class="sidebar-nav">
          <a href="/">문서 홈</a>
          <a href="/graph{% if selected_space and selected_space != 'all' %}?space={{ selected_space }}{% endif %}">Graph View</a>
        </nav>
        <form class="search-box" action="/search" method="get">
          <input type="text" name="q" placeholder="문서 검색" value="{{ search_query or '' }}" />
          <div class="search-actions">
            <button type="submit" class="sidebar-action-button">검색</button>
            <button type="button" class="sidebar-action-button" id="query-generator-open">위키 생성</button>
          </div>
        </form>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
    <button
      type="button"
      class="assistant-fab"
      id="assistant-fab"
      aria-label="위키에게 묻기"
      aria-controls="assistant-modal"
      aria-expanded="false"
    >
      위키에게 묻기
    </button>
    <div class="assistant-modal-backdrop" id="assistant-backdrop" hidden></div>
    <section
      class="assistant-modal"
      id="assistant-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="assistant-title"
      hidden
    >
      <header class="assistant-modal-header">
        <div>
          <div class="eyebrow">Wiki Assistant</div>
          <h2 id="assistant-title">문서 기반 질문</h2>
        </div>
        <button type="button" class="assistant-close" id="assistant-close" aria-label="닫기">×</button>
      </header>
      <div class="assistant-controls">
        <label class="assistant-scope">
          <input
            type="radio"
            name="assistant-scope"
            value="space"
            {% if selected_space == 'all' %}disabled{% else %}checked{% endif %}
          />
          현재 선택된 Space
        </label>
        <label class="assistant-scope">
          <input
            type="radio"
            name="assistant-scope"
            value="global"
            {% if selected_space == 'all' %}checked{% endif %}
          />
          전체 위키
        </label>
      </div>
      <div class="assistant-thread" id="assistant-thread">
        <div class="assistant-empty">
          현재 화면의 위키를 기준으로 질문할 수 있습니다. 답변에는 참고한 문서 링크가 함께 표시되고, 유용한 답변은 분석 문서로 저장할 수 있습니다.
        </div>
      </div>
      <form class="assistant-form" id="assistant-form">
        <textarea id="assistant-question" rows="4" placeholder="예: 운영 대시보드 문서가 설명하는 핵심 지표는 뭐야?"></textarea>
        <div class="assistant-form-footer">
          <span class="assistant-status" id="assistant-status"></span>
          <button type="submit" class="assistant-submit">질문하기</button>
        </div>
      </form>
    </section>
    <script src="/static/wiki-assistant.js"></script>
    <div class="query-generator-backdrop" id="query-generator-backdrop" hidden></div>
    <section
      class="query-generator-modal"
      id="query-generator-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="query-generator-title"
      hidden
    >
      <header class="query-generator-header">
        <div>
          <div class="eyebrow">Query Wiki</div>
          <h2 id="query-generator-title">검색 위키 생성</h2>
          <p class="query-generator-scope" id="query-generator-scope"></p>
        </div>
        <button type="button" class="assistant-close" id="query-generator-close" aria-label="닫기">×</button>
      </header>
      <form class="query-generator-form" id="query-generator-form">
        <label class="query-generator-label" for="query-generator-input">키워드 또는 주제</label>
        <input
          id="query-generator-input"
          name="query"
          type="text"
          autocomplete="off"
          placeholder="예: Codex, LLM Wiki, Ghidra MCP"
        />
        <p class="query-generator-hint">
          검색과 별도로 raw 문서를 다시 훑어 주제 위키를 생성합니다.
        </p>
        <div class="query-generator-progress" id="query-generator-progress" hidden>
          <div class="query-generator-progress-bar" aria-hidden="true">
            <span id="query-generator-progress-fill"></span>
          </div>
          <div class="query-generator-progress-meta">
            <strong id="query-generator-progress-label">0%</strong>
            <span id="query-generator-status">대기 중입니다.</span>
          </div>
          <ul class="query-generator-events" id="query-generator-events"></ul>
          <a class="source-link query-generator-result" id="query-generator-result" href="#" hidden>생성된 위키 보기</a>
        </div>
        <div class="query-generator-actions">
          <span class="query-generator-inline-status" id="query-generator-inline-status"></span>
          <button type="submit" class="assistant-submit" id="query-generator-submit">생성 시작</button>
        </div>
      </form>
    </section>
    <script src="/static/query-generator.js"></script>
  </body>
</html>
