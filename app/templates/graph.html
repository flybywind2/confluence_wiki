{% extends "base.html" %}
{% block title %}Graph View{% endblock %}
{% block content %}
<section class="hero-card graph-hero">
  <div>
    <span class="eyebrow">Obsidian-Style Graph</span>
    <h1>문서 연결 그래프</h1>
    <p>부모-자식 관계와 문서 내 링크를 동시에 시각화합니다.</p>
  </div>
  <div class="legend">
    <span><i class="legend-line hierarchy"></i>Hierarchy</span>
    <span><i class="legend-line wiki"></i>Wiki Link</span>
  </div>
</section>
<section class="graph-card">
  <div id="graph-canvas" data-space="{{ selected_space }}"></div>
</section>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="/static/graph.js"></script>
{% endblock %}
